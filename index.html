
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auto Key</title>

<style>
  .dp-key-widget {
    background-color: #1e293b;
    border: 1px solid #334155;
    border-radius: 12px;
    padding: 25px;
    text-align: center;
    max-width: 100%;
    margin: 20px auto;
    font-family: Segoe UI, sans-serif;
    box-shadow: 0 4px 15px rgba(0,0,0,0.4);
    color: #e2e8f0;
  }

  .dp-key-box {
    background: #0f172a;
    border: 2px dashed #00ffcc;
    color: white;
    font-family: Courier New, monospace;
    font-size: 1.6rem;
    padding: 15px;
    margin-bottom: 20px;
    border-radius: 8px;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 40px;
  }

  .dp-btn {
    background: #00ffcc;
    color: #0f172a;
    padding: 10px 30px;
    border-radius: 50px;
    border: none;
    cursor: pointer;
    font-weight: bold;
  }
</style>
</head>

<body>

<div class="dp-key-widget">
  <h3>Your Key</h3>
  <div class="dp-key-box" id="finalKeyDisplay">Scanning...</div>
  <button class="dp-btn" onclick="copyMyKey(this)">Copy Key</button>
</div>

<script>
// Option A: Only the last part of URL is the key
document.addEventListener("DOMContentLoaded", () => {
  const box = document.getElementById("finalKeyDisplay");

  // Split URL path and get last segment
  const parts = window.location.pathname.split("/").filter(Boolean);
  let key = parts[parts.length - 1];

  // If the last part is "get", then no key was provided
  if (!key || key.toLowerCase() === "get") {
    box.textContent = "NO KEY FOUND";
    box.style.color = "red";
    return;
  }

  box.textContent = key;
});

// Copy key
function copyMyKey(btn) {
  const value = document.getElementById("finalKeyDisplay").textContent;

  if (value === "NO KEY FOUND") {
    alert("No key found.");
    return;
  }

  navigator.clipboard.writeText(value).then(() => {
    btn.textContent = "Copied!";
    setTimeout(() => btn.textContent = "Copy Key", 1500);
  });
}
</script>

</body>
</html>
